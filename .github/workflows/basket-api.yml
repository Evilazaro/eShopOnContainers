name: basket-api CI

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/basket-api/**' # Branches containing feature/ in the name
      - 'bugfix/basket-api/**' # Branches containing bugfix/ in the name
      - 'hotfix/basket-api/**' # Branches containing hotfix/ in the name
      - 'release/basket-api/**' # Branches containing release/ in the name
      - 'refactor/basket-api/**' # Branches containing refactor/ in the name
      - 'test/basket-api/**' # Branches containing test/ in the name
      - 'techdebt/basket-api/**' # Branches containing techdebt/ in the name

    paths:
      - src/BuildingBlocks/**
      - src/Services/Basket/**
      - .github/workflows/basket-api.yml
  
  pull_request: # Trigger the workflow on pull requests
    branches:
      - main
  
    paths:
      - src/BuildingBlocks/**
      - src/Services/Basket/**
      - .github/workflows/basket-api.yml

env:
  SERVICE: basket-api
  IMAGE: basket.api

jobs:

  basket-api-ci:
    runs-on: ubuntu-latest
    # if: ${{ github.event_name == 'pull_request' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - uses: ./.github/workflows/composite/build
      with:
        service: ${{ env.SERVICE }}
        # registry_endpoint: ${{ secrets.REGISTRY_ENDPOINT }}

