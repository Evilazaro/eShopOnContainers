name: "Build for PRe"
description: "Builds a docker image without pushing"

inputs:
  service:
    description: "Service to build"
    required: true
  # registry_endpoint:
  #   description: "Image registry repo e.g. myacr.azureacr.io/eshop"
  #   required: true

runs:
  using: "composite"
  steps:
  # Install prerequisites
  - name: Install containerd
    shell: bash
    run: |
      sudo apt-get update
      sudo apt-get install -y containerd
      sudo systemctl start containerd
      sudo systemctl enable containerd
      sudo systemctl status containerd

  # Download nerdctl
  - name: Download nerdctl
    shell: bash 
    run: |
      wget https://github.com/containerd/nerdctl/releases/download/v2.0.3/nerdctl-full-2.0.3-linux-amd64.tar.gz
      tar -xvf nerdctl-full-2.0.3-linux-amd64.tar.gz
      sudo mv nerdctl /usr/local/bin/

  # Verify nerdctl installation
  - name: Verify nerdctl
    shell: bash
    run: |
      nerdctl --version
  
  # Builds the docker image for the service specified
  - name: Compose build ${{ inputs.service }}
    shell: bash
    run: sudo -E nerdctl build ${{ inputs.service }}
    working-directory: ./src
    env:
      TAG: ${{ env.BRANCH }}
      # REGISTRY: ${{ inputs.registry_endpoint }}
