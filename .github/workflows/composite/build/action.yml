name: "Build for PRe"
description: "Builds a docker image without pushing"

inputs:
  service:
    description: "Service to build"
    required: true
  # registry_endpoint:
  #   description: "Image registry repo e.g. myacr.azureacr.io/eshop"
  #   required: true

runs:
  using: "composite"
  steps:
  # Install prerequisites
  - name: Install containerd
    run: |
      sudo apt-get update
      sudo apt-get install -y containerd
      sudo systemctl start containerd
      sudo systemctl enable containerd
      sudo systemctl status containerd

  # Download nerdctl
  - name: Download nerdctl
    run: |
      VERSION=$(curl -s https://api.github.com/repos/containerd/nerdctl/releases/latest | grep tag_name | cut -d '"' -f 4)
      wget https://github.com/containerd/nerdctl/releases/download/${VERSION}/nerdctl-${VERSION}-linux-amd64.tar.gz
      tar -xvf nerdctl-${VERSION}-linux-amd64.tar.gz
      sudo mv nerdctl /usr/local/bin/

  # Verify nerdctl installation
  - name: Verify nerdctl
    run: |
      nerdctl --version
