name: "Build for PRe"
description: "Builds a docker image without pushing"

inputs:
  service:
    description: "Service to build"
    required: true
  # registry_endpoint:
  #   description: "Image registry repo e.g. myacr.azureacr.io/eshop"
  #   required: true

runs:
  using: "composite"
  steps:
  # Update Packages
  - name: Update Packages
    shell: bash
    run: |
      sudo apt-get update
      sudo apt-get upgrade -y
      echo "Packages updated"
      echo "Verifies docker is installed"
      docker --version
  
  # Builds the docker image for the service specified
  - name: Compose build ${{ inputs.service }}
    shell: bash
    run: |
      echo "Building ${{ inputs.service }} image"
      sudo docker-compose build ${{ inputs.service }}
      echo "Built ${{ inputs.service }} image"
    working-directory: ./src
    env:
      TAG: ${{ env.BRANCH }}
      # REGISTRY: ${{ inputs.registry_endpoint }}
