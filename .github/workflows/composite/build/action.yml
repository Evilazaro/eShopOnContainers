name: "Build for PRe"
description: "Builds a docker image without pushing"

inputs:
  service:
    description: "Service to build"
    required: true
  # registry_endpoint:
  #   description: "Image registry repo e.g. myacr.azureacr.io/eshop"
  #   required: true

runs:
  using: "composite"
  steps:
  # Install prerequisites
  - name: Install containerd
    shell: bash
    run: |
      sudo apt-get update
      sudo apt-get install -y containerd
      sudo systemctl start containerd
      sudo systemctl enable containerd
      sudo systemctl status containerd

  # Download nerdctl
  - name: Download nerdctl
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH="amd64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi
          VERSION=$(curl -s https://api.github.com/repos/containerd/nerdctl/releases/latest | grep tag_name | cut -d '"' -f 4)
          wget https://github.com/containerd/nerdctl/releases/download/${VERSION}/nerdctl-${VERSION}-linux-${ARCH}.tar.gz
          tar -xvf nerdctl-${VERSION}-linux-${ARCH}.tar.gz
          sudo mv nerdctl /usr/local/bin/

  # Verify nerdctl installation
  - name: Verify nerdctl
    shell: bash
    run: |
      nerdctl --version
