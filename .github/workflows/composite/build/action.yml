name: "Build for PRe"
description: "Builds a docker image without pushing"

inputs:
  service:
    description: "Service to build"
    required: true
  # registry_endpoint:
  #   description: "Image registry repo e.g. myacr.azureacr.io/eshop"
  #   required: true

runs:
  using: "composite"
  steps:
  - name: Update Packages
    shell: bash
    run: | 
      sudo apt-get update && \
      sudo curl -L -o nerdctl.tar.gz "https://github.com/containerd/nerdctl/releases/download/v2.0.3/nerdctl-full-2.0.3-linux-arm64.tar.gz" && \
      file nerdctl.tar.gz && \
      sudo tar -xzf nerdctl.tar.gz -C /usr/local/bin && \
      # sudo chmod +x /usr/local/bin/nerdctl && \
      ls /usr/local/bin/
      # nerdctl --version
