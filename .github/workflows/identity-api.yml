name: identity-api CI

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/identity-api/**' # Branches containing feature/ in the name
      - 'bugfix/identity-api/**' # Branches containing bugfix/ in the name
      - 'hotfix/identity-api/**' # Branches containing hotfix/ in the name
      - 'release/identity-api/**' # Branches containing release/ in the name
      - 'refactor/identity-api/**' # Branches containing refactor/ in the name
      - 'test/identity-api/**' # Branches containing test/ in the name
      - 'techdebt/identity-api/**' # Branches containing techdebt/ in the name
    paths:
      - src/BuildingBlocks/**
      - src/Services/Identity/**
      - .github/workflows/identity-api.yml

  pull_request: # Trigger the workflow on pull requests
    branches:
      - main
    paths:
      - src/BuildingBlocks/**
      - src/Services/Identity/**
      - .github/workflows/identity-api.yml

env:
  SERVICE: identity-api
  IMAGE: identity.api

jobs:
  BuildContainersForPR_Linux:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: ./.github/workflows/composite/build
        with:
          service: ${{ env.SERVICE }}

