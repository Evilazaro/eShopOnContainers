name: webmvc CI

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/webmvc/**' # Branches containing feature/ in the name
      - 'bugfix/webmvc/**' # Branches containing bugfix/ in the name
      - 'hotfix/webmvc/**' # Branches containing hotfix/ in the name
      - 'release/webmvc/**' # Branches containing release/ in the name
      - 'refactor/webmvc/**' # Branches containing refactor/ in the name
      - 'test/webmvc/**' # Branches containing test/ in the name
      - 'techdebt/webmvc/**' # Branches containing techdebt/ in the name
    paths:
      - src/BuildingBlocks/**
      - src/Web/WebMVC/**
      - .github/workflows/webmvc.yml

  pull_request: # Trigger the workflow on pull requests
    branches:
      - main
    paths:
      - src/BuildingBlocks/**
      - src/Web/WebMVC/**
      - .github/workflows/webmvc.yml

env:
  SERVICE: webmvc
  IMAGE: webmvc

jobs:
  BuildContainersForPR_Linux:
    runs-on: ubuntu-latest
    # if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: ./.github/workflows/composite/build
        with:
          service: ${{ env.SERVICE }}
          # registry_endpoint: ${{ secrets.REGISTRY_ENDPOINT }}

